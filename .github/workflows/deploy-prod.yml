# =============================================================================
# WeatherWise - Deploy nach Azure PROD-Umgebung
# =============================================================================
# Wird ausgelöst beim Push auf main-Branch.
# Erfordert manuelle Freigabe (GitHub Environment Protection).
# =============================================================================
name: Deploy to PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: weatherwise-prod-rg
  AZURE_LOCATION: switzerlandnorth
  ENVIRONMENT_NAME: prod
  ACR_NAME: weatherwiseacrprod2026
  CONTAINER_APP_ENV: weatherwise-env-prod
  BACKEND_APP_NAME: weatherwise-backend-prod
  FRONTEND_APP_NAME: weatherwise-frontend-prod

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests vor Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backend-Tests
        working-directory: backend
        env:
          OPENWEATHER_API_KEY: test-api-key
          APP_ENV: test
        run: |
          pip install -r requirements-dev.txt
          pytest

  # ---------------------------------------------------------------------------
  # Job 2: Security-Scan
  # ---------------------------------------------------------------------------
  security:
    name: Security-Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Repository-Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'  # PROD: Build abbrechen bei kritischen Funden
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Job 3: Images bauen und zu ACR pushen
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Bauen und zu ACR pushen
    runs-on: ubuntu-latest
    needs: [test, security]
    environment: production  # GitHub Environment - Schutz möglich
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Image-Tag generieren
        id: meta
        run: |
          TAG="v$(date +%Y.%m.%d)-${GITHUB_SHA::8}"
          echo "image-tag=$TAG" >> $GITHUB_OUTPUT

      - name: Azure-Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Bei ACR anmelden
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Backend-Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/weatherwise-backend:${{ steps.meta.outputs.image-tag }}
            ${{ env.ACR_NAME }}.azurecr.io/weatherwise-backend:latest
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,scope=backend-prod,mode=max

      - name: Frontend-Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/weatherwise-frontend:${{ steps.meta.outputs.image-tag }}
            ${{ env.ACR_NAME }}.azurecr.io/weatherwise-frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.PROD_BACKEND_URL }}
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,scope=frontend-prod,mode=max

  # ---------------------------------------------------------------------------
  # Job 4: Infrastruktur deployen
  # ---------------------------------------------------------------------------
  deploy-infrastructure:
    name: Infrastruktur (Bicep) deployen
    runs-on: ubuntu-latest
    needs: [test, security]
    environment: production
    outputs:
      backend-url: ${{ steps.deploy.outputs.backend-url }}
      frontend-url: ${{ steps.deploy.outputs.frontend-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure-Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resource Group sicherstellen
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags environment=prod project=weatherwise owner="Mehmet Ali Gür"

      - name: Bicep What-If (Vorschau)
        run: |
          az deployment group what-if \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.parameters.json \
            --parameters openWeatherApiKey="${{ secrets.OPENWEATHER_API_KEY_PROD }}"

      - name: Bicep deployen
        id: deploy
        run: |
          OUTPUTS=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.parameters.json \
            --parameters openWeatherApiKey="${{ secrets.OPENWEATHER_API_KEY_PROD }}" \
            --query properties.outputs \
            --output json)

          BACKEND_URL=$(echo "$OUTPUTS" | jq -r '.backendUrl.value')
          FRONTEND_URL=$(echo "$OUTPUTS" | jq -r '.frontendUrl.value')

          echo "backend-url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Job 5: Container Apps aktualisieren
  # ---------------------------------------------------------------------------
  update-container-apps:
    name: Container Apps aktualisieren
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-infrastructure]
    environment: production

    steps:
      - name: Azure-Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Backend mit Rolling Update
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/weatherwise-backend:${{ needs.build-and-push.outputs.image-tag }} \
            --revision-suffix "v$(date +%s)"

      - name: Frontend mit Rolling Update
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/weatherwise-frontend:${{ needs.build-and-push.outputs.image-tag }} \
            --revision-suffix "v$(date +%s)"

  # ---------------------------------------------------------------------------
  # Job 6: Smoke-Tests
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke-Tests
    runs-on: ubuntu-latest
    needs: [update-container-apps, deploy-infrastructure]

    steps:
      - name: Auf Rollout warten
        run: sleep 60

      - name: Backend-Health prüfen
        run: |
          for i in {1..30}; do
            if curl -fs "${{ needs.deploy-infrastructure.outputs.backend-url }}/health" > /dev/null 2>&1; then
              echo "Backend ist gesund"
              curl -s "${{ needs.deploy-infrastructure.outputs.backend-url }}/health" | jq .
              exit 0
            fi
            echo "Warte auf Backend (Versuch $i/30)..."
            sleep 10
          done
          exit 1

      - name: Frontend prüfen
        run: |
          curl -fs "${{ needs.deploy-infrastructure.outputs.frontend-url }}" -o /dev/null
          echo "Frontend ist erreichbar"

      - name: API-Test (Wetterdaten)
        run: |
          response=$(curl -s "${{ needs.deploy-infrastructure.outputs.backend-url }}/api/weather?city=Bern")
          echo "Response (gekürzt): ${response:0:200}"

      - name: PROD-Deploy-Zusammenfassung
        run: |
          echo "## PROD-Deployment erfolgreich" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image-Tag:** \`${{ needs.build-and-push.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URLs:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.deploy-infrastructure.outputs.frontend-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend:  ${{ needs.deploy-infrastructure.outputs.backend-url }}" >> $GITHUB_STEP_SUMMARY
