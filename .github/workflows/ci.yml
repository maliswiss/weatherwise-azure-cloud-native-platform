# =============================================================================
# WeatherWise - Continuous Integration Pipeline
# =============================================================================
# Erfüllt Bewertungskriterien LB2:
#   - K2 (CI/CD): Lint, Test, Build, Deploy mit Branch-Strategie
#   - K8 (Security): Dependency-Scanning via Trivy
#   - K10 (Komplexität): Multi-Job-Pipeline mit paralleler Ausführung
#
# Branch-Strategie:
#   - develop: Entwicklungs-Branch
#   - main: Produktions-Branch
#
# Quality Gates (alle müssen bestehen):
#   1. Backend Lint (Ruff)
#   2. Backend Tests (Pytest mit Coverage)
#   3. Frontend Lint (ESLint)
#   4. Frontend Build (TypeScript + Vite)
#   5. Docker Multi-Stage Build
#   6. Security Scan (Trivy)
#   7. Integration Test (Docker Compose Smoke-Test)
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Backend - Lint + Test
  # ---------------------------------------------------------------------------
  backend-lint-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint mit Ruff
        run: ruff check . --output-format=github

      - name: Format-Check mit Ruff
        run: ruff format --check .

      - name: Tests mit Pytest
        env:
          OPENWEATHER_API_KEY: test-api-key
          REDIS_URL: redis://localhost:6379/15
          APP_ENV: test
        run: pytest

      - name: Coverage-Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Frontend - Lint + Build
  # ---------------------------------------------------------------------------
  frontend-lint-build:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci --no-audit --no-fund

      - name: Lint mit ESLint
        run: npm run lint

      - name: TypeScript-Build
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Docker-Images bauen
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker - Multi-Stage Build
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Backend-Image bauen
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: weatherwise-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          load: true

      - name: Frontend-Image bauen
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: weatherwise-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          load: true

      - name: Image-Größen prüfen
        run: |
          echo "=== Image-Größen ==="
          docker images weatherwise-backend:ci
          docker images weatherwise-frontend:ci

      - name: Backend-Image speichern
        run: docker save weatherwise-backend:ci -o /tmp/backend.tar

      - name: Frontend-Image speichern
        run: docker save weatherwise-frontend:ci -o /tmp/frontend.tar

      - name: Backend-Image als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: docker-backend-image
          path: /tmp/backend.tar
          retention-days: 1

      - name: Frontend-Image als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: docker-frontend-image
          path: /tmp/frontend.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 4: Security-Scan mit Trivy
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security - Trivy Scan
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Backend-Image laden
        uses: actions/download-artifact@v4
        with:
          name: docker-backend-image
          path: /tmp

      - name: Frontend-Image laden
        uses: actions/download-artifact@v4
        with:
          name: docker-frontend-image
          path: /tmp

      - name: Docker-Images laden
        run: |
          docker load -i /tmp/backend.tar
          docker load -i /tmp/frontend.tar

      - name: Trivy - Backend scannen
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: weatherwise-backend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Trivy - Frontend scannen
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: weatherwise-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Trivy - SARIF-Report Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: weatherwise-backend:ci
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: SARIF in GitHub Security hochladen
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  # ---------------------------------------------------------------------------
  # Job 5: Integration-Smoke-Test
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration - Docker Compose
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Backend-Image laden
        uses: actions/download-artifact@v4
        with:
          name: docker-backend-image
          path: /tmp

      - name: Frontend-Image laden
        uses: actions/download-artifact@v4
        with:
          name: docker-frontend-image
          path: /tmp

      - name: Docker-Images laden
        run: |
          docker load -i /tmp/backend.tar
          docker load -i /tmp/frontend.tar
          docker tag weatherwise-backend:ci weatherwise-backend:local
          docker tag weatherwise-frontend:ci weatherwise-frontend:local

      - name: Test-.env erstellen
        run: |
          cat > .env <<EOF
          OPENWEATHER_API_KEY=ci-test-key-not-real
          OPENWEATHER_BASE_URL=https://api.openweathermap.org/data/2.5
          CACHE_TTL_SECONDS=60
          CORS_ORIGINS=http://localhost:8080
          APP_ENV=ci
          VITE_API_BASE_URL=http://localhost:8000
          EOF

      - name: Docker Compose starten
        run: docker compose up -d --no-build

      - name: Auf gesunde Services warten
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend ist gesund"
              break
            fi
            echo "Warte auf Backend (Versuch $i/30)..."
            sleep 2
          done

      - name: Backend-Health prüfen
        run: |
          response=$(curl -fs http://localhost:8000/health)
          echo "Health-Response: $response"
          echo "$response" | grep -q '"status":"ok"' || exit 1

      - name: Frontend-Health prüfen
        run: |
          response=$(curl -fs http://localhost:8080/health)
          echo "Frontend-Health: $response"
          echo "$response" | grep -q '"status":"ok"' || exit 1

      - name: Container-Logs bei Fehler
        if: failure()
        run: docker compose logs

      - name: Services stoppen
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # Job 6: Zusammenfassung
  # ---------------------------------------------------------------------------
  ci-summary:
    name: CI - Zusammenfassung
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build, docker-build, security-scan, integration-test]
    if: always()

    steps:
      - name: Ergebnisse zusammenfassen
        run: |
          echo "## CI Pipeline - Zusammenfassung" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint & Test | ${{ needs.backend-lint-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint & Build | ${{ needs.frontend-lint-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Test | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
