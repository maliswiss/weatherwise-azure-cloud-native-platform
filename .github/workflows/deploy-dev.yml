# =============================================================================
# WeatherWise - Deploy nach Azure DEV-Umgebung
# =============================================================================
# Wird ausgelöst beim Push auf develop-Branch.
# Baut Images, pusht sie zu Azure Container Registry und deployt
# in die DEV-Umgebung (Azure Container Apps).
#
# Erfüllt:
#   - K2 (CI/CD): vollständiger Deploy-Workflow
#   - K3 (Secrets): Verwendung von GitHub Secrets + Azure Key Vault
#   - K4 (Deployment-Ziel): Azure Container Apps mit HTTPS + Healthcheck
# =============================================================================
name: Deploy to DEV

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false  # Deploys nicht abbrechen

env:
  AZURE_RESOURCE_GROUP: weatherwise-dev-rg
  AZURE_LOCATION: switzerlandnorth
  ENVIRONMENT_NAME: dev
  ACR_NAME: weatherwiseacrdev2026
  CONTAINER_APP_ENV: weatherwise-env-dev
  BACKEND_APP_NAME: weatherwise-backend-dev
  FRONTEND_APP_NAME: weatherwise-frontend-dev

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Tests (Re-Run für Sicherheit)
  # ---------------------------------------------------------------------------
  test:
    name: Tests vor Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backend-Tests
        working-directory: backend
        env:
          OPENWEATHER_API_KEY: test-api-key
          APP_ENV: test
        run: |
          pip install -r requirements-dev.txt
          pytest

  # ---------------------------------------------------------------------------
  # Job 2: Images bauen und zu ACR pushen
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Bauen und zu ACR pushen
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Image-Tag generieren
        id: meta
        run: |
          TAG="${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S)"
          echo "image-tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image-Tag: $TAG"

      - name: Azure-Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Bei ACR anmelden
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Backend-Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/weatherwise-backend:${{ steps.meta.outputs.image-tag }}
            ${{ env.ACR_NAME }}.azurecr.io/weatherwise-backend:latest
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,scope=backend-dev,mode=max

      - name: Frontend-Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/weatherwise-frontend:${{ steps.meta.outputs.image-tag }}
            ${{ env.ACR_NAME }}.azurecr.io/weatherwise-frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.DEV_BACKEND_URL }}
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,scope=frontend-dev,mode=max

  # ---------------------------------------------------------------------------
  # Job 3: Infrastruktur deployen (Bicep)
  # ---------------------------------------------------------------------------
  deploy-infrastructure:
    name: Infrastruktur (Bicep) deployen
    runs-on: ubuntu-latest
    needs: test
    outputs:
      backend-url: ${{ steps.deploy.outputs.backend-url }}
      frontend-url: ${{ steps.deploy.outputs.frontend-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure-Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resource Group sicherstellen
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags environment=dev project=weatherwise owner="Mehmet Ali Gür"

      - name: Bicep validieren
        run: |
          az deployment group validate \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.parameters.json \
            --parameters openWeatherApiKey="${{ secrets.OPENWEATHER_API_KEY_DEV }}"

      - name: Bicep deployen
        id: deploy
        run: |
          OUTPUTS=$(az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.parameters.json \
            --parameters openWeatherApiKey="${{ secrets.OPENWEATHER_API_KEY_DEV }}" \
            --query properties.outputs \
            --output json)

          BACKEND_URL=$(echo "$OUTPUTS" | jq -r '.backendUrl.value')
          FRONTEND_URL=$(echo "$OUTPUTS" | jq -r '.frontendUrl.value')

          echo "backend-url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "frontend-url=$FRONTEND_URL" >> $GITHUB_OUTPUT

          echo "## Deployment URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Backend:  $BACKEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: $FRONTEND_URL" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job 4: Container Apps mit neuen Images aktualisieren
  # ---------------------------------------------------------------------------
  update-container-apps:
    name: Container Apps aktualisieren
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-infrastructure]

    steps:
      - uses: actions/checkout@v4

      - name: Azure-Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Backend-Container-App aktualisieren
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/weatherwise-backend:${{ needs.build-and-push.outputs.image-tag }}

      - name: Frontend-Container-App aktualisieren
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/weatherwise-frontend:${{ needs.build-and-push.outputs.image-tag }}

  # ---------------------------------------------------------------------------
  # Job 5: Smoke-Tests nach Deploy
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke-Tests
    runs-on: ubuntu-latest
    needs: [update-container-apps, deploy-infrastructure]

    steps:
      - name: Auf Rollout warten
        run: sleep 30

      - name: Backend-Health prüfen
        run: |
          for i in {1..20}; do
            if curl -fs "${{ needs.deploy-infrastructure.outputs.backend-url }}/health" > /dev/null 2>&1; then
              echo "Backend ist gesund"
              curl -s "${{ needs.deploy-infrastructure.outputs.backend-url }}/health" | jq .
              exit 0
            fi
            echo "Warte auf Backend (Versuch $i/20)..."
            sleep 10
          done
          echo "Backend nicht erreichbar"
          exit 1

      - name: Frontend-Erreichbarkeit prüfen
        run: |
          curl -fs "${{ needs.deploy-infrastructure.outputs.frontend-url }}" -o /dev/null
          echo "Frontend ist erreichbar"

      - name: Deploy-Zusammenfassung
        run: |
          echo "## DEV-Deployment erfolgreich" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image-Tag:** \`${{ needs.build-and-push.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URLs:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.deploy-infrastructure.outputs.frontend-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend:  ${{ needs.deploy-infrastructure.outputs.backend-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- API-Docs: ${{ needs.deploy-infrastructure.outputs.backend-url }}/docs" >> $GITHUB_STEP_SUMMARY
