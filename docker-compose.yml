# =============================================================================
# WeatherWise - Docker Compose Setup
# Erfüllt K9 (Reproduzierbarkeit): 'docker compose up' startet alles
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Redis - In-Memory-Cache für OpenWeatherMap-Antworten
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: weatherwise-redis
    restart: unless-stopped
    # Redis nur intern erreichbar - kein Port-Mapping nach außen
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - weatherwise-net

  # ---------------------------------------------------------------------------
  # Backend - FastAPI-Proxy für OpenWeatherMap
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: weatherwise-backend:local
    container_name: weatherwise-backend
    restart: unless-stopped
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:?OPENWEATHER_API_KEY muss in .env gesetzt sein}
      OPENWEATHER_BASE_URL: ${OPENWEATHER_BASE_URL:-https://api.openweathermap.org/data/2.5}
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-600}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - weatherwise-net

  # ---------------------------------------------------------------------------
  # Frontend - React-SPA hinter Nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: weatherwise-frontend:local
    container_name: weatherwise-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - weatherwise-net

# -----------------------------------------------------------------------------
# Internes Netzwerk - alle Services kommunizieren über Service-Namen
# -----------------------------------------------------------------------------
networks:
  weatherwise-net:
    driver: bridge
    name: weatherwise-net
