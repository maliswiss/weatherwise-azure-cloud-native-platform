# =============================================================================
# Nginx-Konfiguration für das WeatherWise-Frontend
# Erfüllt K8 (Security-Headers) und liefert die statischen SPA-Dateien aus
# =============================================================================

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Security-Headers (K8 - Best Practices)
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://openweathermap.org; connect-src 'self' https://*.azurecontainerapps.io https://api.openweathermap.org http://localhost:8000; font-src 'self' data: https://fonts.gstatic.com;" always;

    # Server-Tokens ausblenden (keine Versionsinfo preisgeben)
    server_tokens off;

    # -------------------------------------------------------------------------
    # Gzip-Kompression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # -------------------------------------------------------------------------
    # Statische Assets mit langem Cache
    # -------------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # Health-Endpoint für Container-Orchestrator
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"frontend"}';
    }

    # -------------------------------------------------------------------------
    # SPA-Fallback - alle Routen auf index.html
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
